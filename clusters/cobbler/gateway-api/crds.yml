---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway-crds
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    tag: v1.6.1
  url: https://github.com/kubernetes-sigs/gateway-api/
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-crds
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./config/crd/experimental
  prune: true
  sourceRef:
    kind: GitRepository
    name: gateway-crds
