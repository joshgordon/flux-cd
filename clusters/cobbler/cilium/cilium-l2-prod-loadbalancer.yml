---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: l2-k8s-prod-policy
spec:
  externalIPs: true
  interfaces:
    - ^en.*
  loadBalancerIPs: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  serviceSelector:
    matchLabels:
      expose: "true"
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: l2-k8s-prod-pool
spec:
  serviceSelector:
    matchLabels:
      expose: "true"
  blocks:
    - start: 10.3.14.48
      stop: 10.3.14.63
