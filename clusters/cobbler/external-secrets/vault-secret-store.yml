---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: https://vault.cobbler.gordns.net
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets-role
          serviceAccountRef:
            # Not just "external-secrets" - Flux's helm-controller prefixes the
            # release name with targetNamespace, so the chart's fullname (and
            # therefore its default SA name) comes out as
            # external-secrets-external-secrets. Confirmed via
            # `kubectl get sa -n external-secrets`.
            name: external-secrets-external-secrets
            namespace: external-secrets
