---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  interval: 1h0m0s
  url: https://flux-iac.github.io/tofu-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  chart:
    spec:
      chart: tofu-controller
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: tofu-controller
  interval: 1m0s
  values:
    # Restrict the runner (tf-runner) service account, and therefore which
    # namespaces Terraform CRs may run from, to flux-system - same namespace
    # every other reconciler object in this repo lives in.
    runner:
      serviceAccount:
        allowedNamespaces:
          - flux-system
