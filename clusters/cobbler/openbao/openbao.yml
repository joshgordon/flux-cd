---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openbao
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://openbao.github.io/openbao-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: flux-system
spec:
  chart:
    spec:
      chart: openbao
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: openbao
  interval: 1m0s
  values:
    global:
      # FIXME
      tlsDisable: false
    server:
      extraInitContainers:
        - name: fetch-cloudflare-plugin
          image: busybox:1.38-glibc
          env:
            - name: PLUGIN_VERSION
              value: "v1.1.5" # <-- bump this to upgrade
            - name: PLUGIN_REPO
              value: "kalw/vault-cloudflare-secret-engine"
            - name: PLUGIN_NAME
              value: "vault-cloudflare-secret-engine"
            - name: AMD64_SHA256
              value: "2c244a9ef4babfb5393fbd648d265a8d3fcbd544cf0d023d6fe624519eead35e"
            - name: ARM64_SHA256
              value: "382b055119a8c03f0adefa8afdc412a1876a937b82307d466fd1951ad1b12fba"
          command:
            - sh
            - -c
            - |
              set -euo pipefail

              BASE="https://github.com/${PLUGIN_REPO}/releases/download/${PLUGIN_VERSION}"
              # GoReleaser's default naming strips the leading "v" from the version
              # in asset filenames, even though the release tag (used in the URL
              # path above) keeps it -- so v1.1.5 the tag, but 1.1.5 the filename.
              ASSET_VERSION="${PLUGIN_VERSION#v}"
              WORK="$(mktemp -d)"
              cd "$WORK"

              verify() {
                FILE="$1"; EXPECTED="$2"
                ACTUAL="$(sha256sum "$FILE" | cut -d ' ' -f1)"
                if [ "$ACTUAL" != "$EXPECTED" ]; then
                  echo "checksum mismatch for $FILE: expected $EXPECTED, got $ACTUAL" >&2
                  exit 1
                fi
              }

              echo "Fetching ${PLUGIN_NAME}_${ASSET_VERSION}_linux_amd64..."
              wget -q -O "${PLUGIN_NAME}_${ASSET_VERSION}_linux_amd64" \
                "${BASE}/${PLUGIN_NAME}_${ASSET_VERSION}_linux_amd64"
              verify "${PLUGIN_NAME}_${ASSET_VERSION}_linux_amd64" "$AMD64_SHA256"
              cp "${PLUGIN_NAME}_${ASSET_VERSION}_linux_amd64" "/plugins/${PLUGIN_NAME}.amd64"
              chmod 0755 "/plugins/${PLUGIN_NAME}.amd64"

              echo "Fetching ${PLUGIN_NAME}_${ASSET_VERSION}_linux_arm64..."
              wget -q -O "${PLUGIN_NAME}_${ASSET_VERSION}_linux_arm64" \
                "${BASE}/${PLUGIN_NAME}_${ASSET_VERSION}_linux_arm64"
              verify "${PLUGIN_NAME}_${ASSET_VERSION}_linux_arm64" "$ARM64_SHA256"
              cp "${PLUGIN_NAME}_${ASSET_VERSION}_linux_arm64" "/plugins/${PLUGIN_NAME}.arm64"
              chmod 0755 "/plugins/${PLUGIN_NAME}.arm64"

              AMD64_SHA="$AMD64_SHA256"
              ARM64_SHA="$ARM64_SHA256"

              echo "Writing arch-detecting wrapper..."
              cat > "/plugins/${PLUGIN_NAME}" <<WRAPPER
              #!/bin/sh
              set -eu

              DIR="\$(CDPATH= cd -- "\$(dirname -- "\$0")" && pwd)"

              case "\$(uname -m)" in
                x86_64)
                  BIN="\$DIR/${PLUGIN_NAME}.amd64"
                  EXPECTED_SHA256="${AMD64_SHA}"
                  ;;
                aarch64|arm64)
                  BIN="\$DIR/${PLUGIN_NAME}.arm64"
                  EXPECTED_SHA256="${ARM64_SHA}"
                  ;;
                *)
                  echo "unsupported architecture: \$(uname -m)" >&2
                  exit 1
                  ;;
              esac

              ACTUAL_SHA256="\$(sha256sum "\$BIN" | cut -d ' ' -f1)"
              if [ "\$ACTUAL_SHA256" != "\$EXPECTED_SHA256" ]; then
                echo "checksum mismatch for \$BIN: expected \$EXPECTED_SHA256, got \$ACTUAL_SHA256" >&2
                exit 1
              fi

              exec "\$BIN" "\$@"
              WRAPPER

              chmod 0755 "/plugins/${PLUGIN_NAME}"

              echo "Done. Wrapper sha256 for OpenBao registration:"
              sha256sum "/plugins/${PLUGIN_NAME}"
          volumeMounts:
            - name: plugins
              mountPath: /plugins

      affinity: |
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ template "openbao.name" . }}
                  app.kubernetes.io/instance: "{{ .Release.Name }}"
                  component: server
              topologyKey: failure-domain.gordns.net
      dataStorage:
        storageClass: local-path
      extraArgs: "-config=/etc/bao/config/seal.hcl"
      extraEnvironmentVars:
        VAULT_ADDR: "https://vault.cobbler.gordns.net"
      volumes:
        - name: seal-config
          secret:
            secretName: bao-seal-config
        - name: tls
          secret:
            secretName: vault-tls-cert
        - name: plugins
          emptyDir: {}
      volumeMounts:
        - name: seal-config
          mountPath: /etc/bao/config
          readOnly: true
        - name: plugins
          mountPath: /etc/bao/plugins
          readOnly: true
        - name: tls
          mountPath: /openbao/tls
          readOnly: true
      ha:
        enabled: true
        raft:
          enabled: true
          config: |
            ui = true

            listener "tcp" {
              address = "[::]:8200"
              cluster_address = "[::]:8201"
              tls_cert_file = "/openbao/tls/tls.crt"
              tls_key_file = "/openbao/tls/tls.key"
              tls_disable = "false"

            }

            storage "raft" {
              path = "/openbao/data"
            }

            service_registration "kubernetes" {}
    ui:
      enabled: true
      serviceType: LoadBalancer
      externalPort: 443
      activeOpenbaoPodOnly: true
      serviceNodePort: null
      targetPort: 8200
      loadBalancerIP: ""
      extraLabels:
        expose: "true"
  targetNamespace: openbao
  install:
    createNamespace: true
