---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openbao
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://openbao.github.io/openbao-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: flux-system
spec:
  chart:
    spec:
      chart: openbao
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: openbao
  interval: 1m0s
  values:
    global:
      # FIXME
      tlsDisable: false
    server:
      affinity: |
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ template "openbao.name" . }}
                  app.kubernetes.io/instance: "{{ .Release.Name }}"
                  component: server
              topologyKey: failure-domain.gordns.net
      dataStorage:
        storageClass: local-path
      extraArgs: "-config=/etc/bao/config/seal.hcl"
      extraEnvironmentVars:
        VAULT_ADDR: "https://vault.cobbler.gordns.net:8200"
      volumes:
        - name: seal-config
          secret:
            secretName: bao-seal-config
        - name: tls
          secret:
            secretName: vault-tls-cert
      volumeMounts:
        - name: seal-config
          mountPath: /etc/bao/config
          readOnly: true
        - name: tls
          mountPath: /openbao/tls
          readOnly: true
      ha:
        enabled: true
        raft:
          enabled: true
          config: |
            ui = true

            listener "tcp" {
              address = "[::]:8200"
              cluster_address = "[::]:8201"
              tls_cert_file = "/openbao/tls/tls.crt"
              tls_key_file = "/openbao/tls/tls.key"
              tls_disable = "false"

            }

            storage "raft" {
              path = "/openbao/data"
            }

            service_registration "kubernetes" {}
    ui:
      enabled: true
      serviceType: LoadBalancer
      externalPort: 8200
      activeOpenbaoPodOnly: true
      serviceNodePort: null
      targetPort: 8200
      loadBalancerIP: ""
      extraLabels:
        expose: "true"
  targetNamespace: openbao
  install:
    createNamespace: true
